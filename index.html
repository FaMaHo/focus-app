<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Auth overlay (shown on first load) -->
<div id="auth-overlay">
  <div class="auth-card">
    <p class="auth-title">Focus ✦</p>
    <p class="auth-sub">Your personal focus companion. Connect Spotify to control your music while you work.</p>
    <button class="auth-spotify-btn" onclick="loginSpotify()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      Connect Spotify
    </button>
    <br>
    <button class="auth-skip" onclick="skipAuth()">Skip for now →</button>
  </div>
</div>

<!-- HOME VIEW -->
<div id="home-view" class="view active">
  <p class="greeting" id="greeting-text">Good morning ✦</p>

  <div class="top-row">
    <!-- Pomodoro -->
    <div class="card" id="pomodoro-card">
      <span class="card-label">Focus timer</span>

      <div class="timer-ring-wrap">
        <svg viewBox="0 0 160 160">
          <circle class="ring-bg" cx="80" cy="80" r="68"/>
          <circle class="ring-progress" id="ring-progress" cx="80" cy="80" r="68"/>
        </svg>
        <div class="timer-text">
          <span class="timer-time" id="timer-display">25:00</span>
          <span class="timer-phase" id="timer-phase">Focus</span>
        </div>
      </div>

      <div class="pomo-controls">
        <button class="btn-primary" id="start-btn" onclick="toggleTimer()">Start</button>
        <button class="btn-ghost" onclick="resetTimer()">Reset</button>
        <button class="btn-ghost focus-mode-btn-wrap" id="focus-mode-btn" onclick="enterFocusMode()" style="padding:10px 14px;">⛶</button>
      </div>

      <div class="pomo-session-count">
        <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
        <span style="font-size:11px; margin-left:4px; color:var(--blue-400)">sessions</span>
      </div>

      <button class="pomo-settings-toggle" onclick="toggleSettings()">Customize timer</button>

      <div class="pomo-settings" id="pomo-settings">
        <div class="setting-row">
          <label>Focus (min)</label>
          <input type="number" id="set-focus" value="25" min="1" max="120">
        </div>
        <div class="setting-row">
          <label>Short break (min)</label>
          <input type="number" id="set-short" value="5" min="1" max="30">
        </div>
        <div class="setting-row">
          <label>Long break (min)</label>
          <input type="number" id="set-long" value="15" min="1" max="60">
        </div>
        <button class="btn-apply" onclick="applySettings()">Apply</button>
      </div>
    </div>

    <!-- Tasks -->
    <div class="card" id="task-card">
      <div class="task-header">
        <span class="card-label" style="margin-bottom:0">Tasks</span>
        <button class="task-add-btn" onclick="toggleTaskInput()">+</button>
      </div>
      <div class="task-input-row" id="task-input-row">
        <input class="task-input" id="task-input" placeholder="What's on your mind?" maxlength="120"
          onkeydown="if(event.key==='Enter') addTask()">
        <button class="task-input-submit" onclick="addTask()">Add</button>
      </div>
      <div class="task-list" id="task-list"></div>
    </div>
  </div>

  <!-- Spotify -->
  <div class="card" id="spotify-card">
    <div class="spotify-art" id="sp-art">
      <div class="spotify-art-placeholder" id="sp-art-placeholder">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="white" opacity="0.3"/><circle cx="12" cy="12" r="6" fill="white" opacity="0.3"/><circle cx="12" cy="12" r="2.5" fill="white"/></svg>
      </div>
    </div>
    <div class="spotify-info">
      <div class="spotify-track" id="sp-track">Not connected</div>
      <div class="spotify-artist" id="sp-artist">—</div>
    </div>
    <div class="sp-progress-wrap" id="sp-progress-wrap" style="display:none">
      <div class="sp-progress-bar" id="sp-progress-bar"></div>
    </div>
    <div class="spotify-controls" id="sp-controls-connected" style="display:none">
      <button class="sp-btn" onclick="spPrev()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="sp-btn play-btn" onclick="spPlayPause()" id="sp-play-btn">
        <svg viewBox="0 0 24 24" fill="currentColor" id="sp-play-icon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="sp-btn" onclick="spNext()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div id="sp-connect-area">
      <button class="sp-connect-btn" onclick="loginSpotify()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Connect
      </button>
    </div>
  </div>
</div>

<!-- FOCUS VIEW -->
<div id="focus-view" class="view">
  <button class="focus-exit" onclick="exitFocusMode()">← Back</button>

  <p class="focus-phase-label" id="focus-phase-label">Focus session</p>

  <div class="focus-ring-wrap">
    <svg viewBox="0 0 240 240">
      <circle class="focus-ring-bg" cx="120" cy="120" r="104"/>
      <circle class="focus-ring-progress" id="focus-ring-progress" cx="120" cy="120" r="104"/>
    </svg>
    <div class="focus-timer-text">
      <span class="focus-time" id="focus-display">25:00</span>
    </div>
  </div>

  <div class="focus-session-dots">
    <div class="dot" id="fd0"></div><div class="dot" id="fd1"></div>
    <div class="dot" id="fd2"></div><div class="dot" id="fd3"></div>
  </div>

  <div class="focus-controls">
    <button class="btn-primary" id="focus-start-btn" onclick="toggleTimer()">Pause</button>
    <button class="btn-ghost" onclick="resetTimer()">Reset</button>
  </div>

  <div class="focus-capture-popup" id="capture-popup">
    <span class="capture-label">Capture the thought, get back to focus</span>
    <input class="capture-input" id="capture-input" placeholder="What's distracting you?"
      onkeydown="if(event.key==='Enter') captureThought(); if(event.key==='Escape') closeCapturePopup()">
    <div class="capture-row">
      <button class="btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="closeCapturePopup()">Cancel</button>
      <button class="btn-primary" style="font-size:12px;padding:6px 16px;" onclick="captureThought()">Save & focus</button>
    </div>
  </div>

  <button class="focus-add-btn" onclick="openCapturePopup()">+</button>

  <div class="focus-spotify-bar">
    <div class="focus-art" id="focus-art">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="white" opacity="0.7"><circle cx="12" cy="12" r="10" fill="white" opacity="0.3"/><circle cx="12" cy="12" r="3" fill="white"/></svg>
    </div>
    <span class="focus-track-name" id="focus-track-name">—</span>
    <button class="sp-btn play-btn" onclick="spPlayPause()" style="padding:2px;">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" id="focus-play-icon"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/tasks.js"></script>
<script src="js/timer.js"></script>
<script src="js/spotify.js"></script>
<script src="js/app.js"></script>
</body>
</html>
